  <div class="hero"><h1>Contact</h1></div>

  <div class="section">
    <h2>Get in Touch</h2>
    <p>We welcome inquiries from clients, partners, and applicants. Please use the form below or reach us directly at <strong>admin@raisko.com</strong>.</p>

    <form action="mailto:admin@raisko.com" method="post" enctype="text/plain">
      <label for="name">Name:</label><br>
      <input type="text" id="name" name="name" required><br><br>

      <label for="subject">Subject:</label><br>
      <input type="text" id="subject" name="subject" required><br><br>

      <label for="email">Email:</label><br>
      <input type="email" id="email" name="email" required><br><br>

      <label for="message">Message:</label><br>
      <textarea id="message" name="message" rows="5" required></textarea><br><br>

      <button type="submit">Send</button>
    </form>
  </div>
